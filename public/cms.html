<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OpenTuwa Studio — Content Management</title>
<link rel="icon" type="image/png" href="https://opentuwa.com/assets/ui/favicon-96x96.png" sizes="96x96" />
<style>
:root {
  --bg-base: #09090b; --bg-panel: #18181b; --bg-input: #27272a;
  --bg-hover: #3f3f46; --border-subtle: #27272a; --border-focus: #52525b;
  --text-main: #f4f4f5; --text-muted: #a1a1aa;
  --accent-bg: #fafafa; --accent-text: #09090b;
  --danger: #ef4444; --success: #10b981; --radius: 6px;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  background: var(--bg-base); color: var(--text-main); margin: 0; padding: 0;
  height: 100vh; display: flex; flex-direction: column; font-size: 14px;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
nav {
  background: var(--bg-base); border-bottom: 1px solid var(--border-subtle);
  padding: 0 1.5rem; height: 52px; min-height: 52px;
  display: flex; justify-content: space-between; align-items: center; z-index: 100;
}
.nav-brand { font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; gap: 0.6rem; font-size: 15px; }
.badge-outline { border: 1px solid var(--border-focus); padding: 2px 6px; border-radius: 4px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.nav-actions { display: flex; gap: 0.5rem; align-items: center; }
main { display: flex; flex-grow: 1; overflow: hidden; height: calc(100vh - 52px); }
.panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border-subtle); background: var(--bg-panel); }
.panel:last-child { border-right: none; }
.panel-header {
  padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  gap: 0.5rem; background: var(--bg-base);
}
.panel-header h2 { margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 0.45rem; }
.panel-body { flex-grow: 1; overflow-y: auto; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.32rem; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.85rem; }
label { font-size: 0.68rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
input, textarea, select {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border-subtle);
  border-radius: 4px; padding: 0.48rem 0.6rem; color: var(--text-main);
  font-family: inherit; font-size: 0.8rem; transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--border-focus); }
select option { background: #18181b; color: var(--text-main); }
textarea { resize: vertical; min-height: 60px; }
button {
  background: transparent; border: 1px solid transparent; color: var(--text-main);
  padding: 0.32rem 0.65rem; border-radius: 4px; cursor: pointer; font-size: 0.76rem;
  font-family: inherit; font-weight: 500; display: inline-flex; align-items: center; gap: 0.32rem;
  transition: all 0.1s; white-space: nowrap;
}
button:hover { background: var(--bg-hover); }
button.btn-primary { background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-bg); font-weight: 600; }
button.btn-primary:hover { background: #e4e4e7; }
button.btn-outline { border: 1px solid var(--border-subtle); }
button.btn-outline:hover { border-color: var(--border-focus); }
button.btn-danger { color: #f87171; }
button.btn-danger:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.btn-icon { padding: 0.28rem 0.38rem; }
.list-filters { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; background: var(--bg-base); }
.entity-list { flex-grow: 1; overflow-y: auto; }
.entity-card {
  padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-subtle);
  cursor: pointer; transition: background 0.1s; display: flex; flex-direction: column; gap: 0.25rem;
}
.entity-card:hover { background: rgba(255,255,255,0.03); }
.entity-card.active { background: var(--bg-input); border-left: 2px solid var(--text-main); padding-left: calc(1.25rem - 2px); }
.card-title { font-size: 0.8rem; font-weight: 500; color: var(--text-main); line-height: 1.35; }
.card-meta { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.1rem; }
.card-date { font-size: 0.67rem; color: var(--text-muted); }
.card-slug { font-size: 0.67rem; color: var(--text-muted); font-family: "SF Mono", monospace; }
.card-tag { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border-focus); }
.list-empty { padding: 2rem 1.25rem; text-align: center; color: var(--text-muted); font-size: 0.78rem; }
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; background: var(--bg-base);
}
.tab-btn {
  padding: 0.6rem 1rem; font-size: 0.76rem; color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.1s; white-space: nowrap;
}
.tab-btn:hover { color: var(--text-main); }
.tab-btn.active { color: var(--text-main); border-bottom-color: var(--text-main); }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; justify-content: center; align-items: center; z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: var(--bg-panel); border: 1px solid var(--border-subtle);
  border-radius: var(--radius); padding: 1.6rem; width: 90%; max-width: 500px;
  max-height: 90vh; overflow-y: auto;
}
.modal-content h2 { margin: 0 0 1.1rem; font-size: 0.95rem; font-weight: 600; }
#toast-container {
  position: fixed; top: 60px; right: 1rem; z-index: 2000;
  display: flex; flex-direction: column; gap: 0.4rem; pointer-events: none;
}
.toast {
  background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: 6px;
  padding: 0.55rem 0.85rem; display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.78rem; min-width: 200px; max-width: 320px;
  transform: translateX(calc(100% + 1.5rem)); opacity: 0;
  transition: transform 0.22s ease, opacity 0.22s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); pointer-events: auto;
}
.toast.toast-show { transform: translateX(0); opacity: 1; }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-info { border-left: 3px solid var(--border-focus); }
.tab-content { display: none; height: 100%; flex-direction: column; }
.tab-content.active { display: flex; }
.two-col { display: grid; grid-template-columns: 35% 1fr; flex-grow: 1; overflow: hidden; }
.skel { background: linear-gradient(90deg,var(--bg-input) 25%,var(--bg-hover) 50%,var(--bg-input) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 3px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }
@media (max-width: 800px) {
  .two-col { grid-template-columns: 1fr; }
  .panel-body { padding: 0.75rem; }
  .row, .row-3 { grid-template-columns: 1fr; }
  input, textarea, select { font-size: 16px !important; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
    </svg>
    OpenTuwa Studio
    <span class="badge-outline">D1</span>
  </div>
  <div class="nav-actions">
    <button class="btn-outline" onclick="loadData()">↻ Refresh</button>
    <button class="btn-outline" onclick="showTokenModal()">🔑 Token</button>
    <button class="btn-primary" id="btn-seed" onclick="seedAlafasyData()">🌱 Seed Alafasy</button>
  </div>
</nav>

<main>
  <div style="display:flex;flex-direction:column;flex:1;">
    <div class="tab-bar">
      <div class="tab-btn active" onclick="switchTab('artists',this)">🎤 Artists</div>
      <div class="tab-btn" onclick="switchTab('albums',this)">💿 Albums</div>
      <div class="tab-btn" onclick="switchTab('tracks',this)">🎵 Tracks</div>
    </div>

    <!-- Artists Tab -->
    <div class="tab-content active" id="tab-artists">
      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <h2>Artists</h2>
            <button class="btn-primary" onclick="showArtistForm(null)">+ New</button>
          </div>
          <div class="list-filters">
            <input type="search" id="artist-search" placeholder="Search artists…" oninput="filterArtists()" />
          </div>
          <div class="entity-list" id="artist-list"><div class="list-empty">Loading…</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2 id="artist-form-title">New Artist</h2></div>
          <div class="panel-body" id="artist-form-panel">
            <div class="form-group"><label>ID (slug key)</label><input id="af-id" placeholder="e.g. alafasy" /></div>
            <div class="form-group"><label>Name *</label><input id="af-name" placeholder="Full name" oninput="autoSlug('af-name','af-slug')" /></div>
            <div class="form-group"><label>Slug</label><input id="af-slug" placeholder="url-slug" /></div>
            <div class="form-group"><label>Bio</label><textarea id="af-bio" placeholder="Biography"></textarea></div>
            <div class="row">
              <div class="form-group"><label>Image URL</label><input id="af-image" placeholder="https://…" /></div>
              <div class="form-group"><label>Artwork URL</label><input id="af-artwork" placeholder="https://…" /></div>
            </div>
            <div class="row">
              <div class="form-group"><label>Genre</label><input id="af-genre" placeholder="Quran, Recitation" /></div>
              <div class="form-group"><label>Website</label><input id="af-website" placeholder="https://…" /></div>
            </div>
            <div class="row">
              <div class="form-group"><label>Twitter</label><input id="af-twitter" placeholder="@handle" /></div>
              <div class="form-group"><label>Instagram</label><input id="af-instagram" placeholder="@handle" /></div>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;">
              <button class="btn-outline" onclick="clearArtistForm()">Clear</button>
              <button class="btn-primary" onclick="saveArtist()">Save Artist</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Albums Tab -->
    <div class="tab-content" id="tab-albums">
      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <h2>Albums</h2>
            <button class="btn-primary" onclick="showAlbumForm(null)">+ New</button>
          </div>
          <div class="list-filters">
            <input type="search" id="album-search" placeholder="Search albums…" oninput="filterAlbums()" />
            <select id="album-artist-filter" onchange="filterAlbums()"><option value="">All artists</option></select>
          </div>
          <div class="entity-list" id="album-list"><div class="list-empty">Loading…</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2 id="album-form-title">New Album</h2></div>
          <div class="panel-body" id="album-form-panel">
            <div class="form-group">
              <label>Artist</label>
              <select id="ab-artist"><option value="">Select artist…</option></select>
            </div>
            <div class="form-group"><label>Title *</label><input id="ab-title" placeholder="Album title" oninput="autoSlug('ab-title','ab-slug')" /></div>
            <div class="form-group"><label>Slug</label><input id="ab-slug" placeholder="url-slug" /></div>
            <div class="form-group"><label>Description</label><textarea id="ab-desc" placeholder="Album description"></textarea></div>
            <div class="row">
              <div class="form-group"><label>Artwork URL</label><input id="ab-artwork" placeholder="https://…" /></div>
              <div class="form-group"><label>Release Date</label><input id="ab-date" type="date" /></div>
            </div>
            <div class="row-3">
              <div class="form-group"><label>Track Count</label><input id="ab-tracks" type="number" min="0" placeholder="0" /></div>
              <div class="form-group"><label>Duration (ms)</label><input id="ab-duration" type="number" min="0" placeholder="0" /></div>
              <div class="form-group"><label>Genre</label><input id="ab-genre" placeholder="Genre" /></div>
            </div>
            <div class="row" style="align-items:end;">
              <div class="form-group">
                <label>Verse-based album?</label>
                <select id="ab-verse"><option value="0">No (normal tracks)</option><option value="1">Yes (Quran-style)</option></select>
              </div>
              <div class="form-group"><label>UPC</label><input id="ab-upc" placeholder="UPC code" /></div>
            </div>
            <div class="row">
              <div class="form-group"><label>Timing Base URL</label><input id="ab-timing-url" placeholder="https://…/{chapter}.json" /></div>
              <div class="form-group"><label>Audio Base URL</label><input id="ab-audio-url" placeholder="https://…/{track}.wav" /></div>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;">
              <button class="btn-outline" onclick="clearAlbumForm()">Clear</button>
              <button class="btn-primary" onclick="saveAlbum()">Save Album</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tracks Tab -->
    <div class="tab-content" id="tab-tracks">
      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <h2>Tracks</h2>
            <button class="btn-primary" onclick="showTrackForm(null)">+ New</button>
          </div>
          <div class="list-filters">
            <input type="search" id="track-search" placeholder="Search tracks…" oninput="filterTracks()" />
            <select id="track-album-filter" onchange="filterTracks()"><option value="">All albums</option></select>
          </div>
          <div class="entity-list" id="track-list"><div class="list-empty">Loading…</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2 id="track-form-title">New Track</h2></div>
          <div class="panel-body" id="track-form-panel">
            <div class="form-group">
              <label>Album</label>
              <select id="tr-album"><option value="">Select album…</option></select>
            </div>
            <div class="form-group"><label>Title *</label><input id="tr-title" placeholder="Track title" /></div>
            <div class="row">
              <div class="form-group"><label>Track #</label><input id="tr-number" type="number" min="1" value="1" /></div>
              <div class="form-group"><label>Disc #</label><input id="tr-disc" type="number" min="1" value="1" /></div>
            </div>
            <div class="row">
              <div class="form-group"><label>Duration (ms)</label><input id="tr-duration" type="number" min="0" value="8000" /></div>
              <div class="form-group"><label>ISRC</label><input id="tr-isrc" placeholder="ISRC code" /></div>
            </div>
            <div class="form-group"><label>Audio URL</label><input id="tr-audio" placeholder="https://…" /></div>
            <div class="form-group"><label>Preview URL</label><input id="tr-preview" placeholder="https://… (short preview)" /></div>
            <div class="form-group"><label>Timing JSON URL</label><input id="tr-timing" placeholder="https://… (verse timing)" /></div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;">
              <button class="btn-outline" onclick="clearTrackForm()">Clear</button>
              <button class="btn-primary" onclick="saveTrack()">Save Track</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="token-modal">
  <div class="modal-content">
    <h2>API Token</h2>
    <div class="form-group">
      <label>CMS API Token</label>
      <input type="password" id="cms-token-input" placeholder="Enter your CMS_API_TOKEN" />
      <span style="font-size:0.65rem;color:var(--text-muted);margin-top:4px;">
        Set via <code>CMS_API_TOKEN</code> env var. Default: <code>opentuwa-cms-token</code>
      </span>
    </div>
    <div style="display:flex;gap:0.4rem;justify-content:flex-end;margin-top:1rem;">
      <button class="btn-outline" onclick="closeModal('token-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveToken()">Save Token</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal-content" style="max-width:400px;">
    <h2 style="color:#f87171;">Confirm Deletion</h2>
    <p id="del-msg" style="font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem;"></p>
    <div style="display:flex;gap:0.4rem;justify-content:flex-end;">
      <button class="btn-outline" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn-danger" id="btn-confirm-del" onclick="executeDelete()">Permanently Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ─── STATE ─── */
let artists = [], albums = [], tracks = [];
let editingArtistId = null, editingAlbumId = null, editingTrackId = null;
let pendingDelete = null;
const API = '/api/d1';

function getToken() { return localStorage.getItem('cms_token') || 'opentuwa-cms-token'; }
function saveToken() {
  const t = document.getElementById('cms-token-input').value.trim();
  if (t) localStorage.setItem('cms_token', t);
  closeModal('token-modal');
  toast('Token saved','success');
}
function showTokenModal() {
  document.getElementById('cms-token-input').value = getToken();
  document.getElementById('token-modal').classList.add('active');
}

/* ─── TOAST ─── */
function toast(msg, type = 'success', duration = 3200) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span style="font-weight:700;flex-shrink:0;">${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('toast-show')));
  setTimeout(() => { el.classList.remove('toast-show'); el.addEventListener('transitionend', () => el.remove(), { once: true }); }, duration);
}

/* ─── API CALL ─── */
async function d1Query(sql, params = []) {
  const token = getToken();
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ sql, params })
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data.results || data.result;
}

/* ─── HELPERS ─── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(id) { return document.getElementById(id)?.value?.trim() || ''; }
function autoSlug(fromId, toId) {
  const v = val(fromId);
  document.getElementById(toId).value = v.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

/* ─── TABS ─── */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'artists' && !artists.length) loadArtists();
  if (tab === 'albums' && !albums.length) loadAlbums();
  if (tab === 'tracks' && !tracks.length) loadTracks();
}

/* ─── MODALS ─── */
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

/* ─── LOAD DATA ─── */
async function loadData() {
  await Promise.all([loadArtists(), loadAlbums(), loadTracks()]);
  toast('Data refreshed','info');
}

async function loadArtists() {
  const list = document.getElementById('artist-list');
  list.innerHTML = '<div class="list-empty">Loading…</div>';
  try {
    artists = await d1Query('SELECT * FROM artists ORDER BY name ASC') || [];
    renderArtistList();
    populateArtistSelect();
  } catch(e) {
    list.innerHTML = `<div class="list-empty" style="color:#f87171;">${esc(e.message)}</div>`;
  }
}

async function loadAlbums() {
  const list = document.getElementById('album-list');
  list.innerHTML = '<div class="list-empty">Loading…</div>';
  try {
    albums = await d1Query('SELECT * FROM albums ORDER BY title ASC') || [];
    renderAlbumList();
    populateAlbumFilters();
    populateAlbumSelect();
  } catch(e) {
    list.innerHTML = `<div class="list-empty" style="color:#f87171;">${esc(e.message)}</div>`;
  }
}

async function loadTracks() {
  const list = document.getElementById('track-list');
  list.innerHTML = '<div class="list-empty">Loading…</div>';
  try {
    tracks = await d1Query('SELECT t.*, a.title AS album_title FROM tracks t LEFT JOIN albums a ON t.album_id = a.id ORDER BY t.track_number ASC') || [];
    renderTrackList();
    populateTrackFilters();
  } catch(e) {
    list.innerHTML = `<div class="list-empty" style="color:#f87171;">${esc(e.message)}</div>`;
  }
}

/* ─── ARTIST RENDER ─── */
function renderArtistList() {
  const list = document.getElementById('artist-list');
  filterArtists();
}

function filterArtists() {
  const q = val('artist-search').toLowerCase();
  const filtered = artists.filter(a => (a.name||'').toLowerCase().includes(q) || (a.id||'').toLowerCase().includes(q));
  const list = document.getElementById('artist-list');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">No artists found.</div>'; return; }
  list.innerHTML = filtered.map(a => `
    <div class="entity-card${a.id === editingArtistId ? ' active' : ''}" onclick="showArtistForm('${esc(a.id)}')">
      <div class="card-title">${esc(a.name)}</div>
      <div class="card-slug">${esc(a.id)} · ${esc(a.genre||'—')}</div>
    </div>
  `).join('');
}

function populateArtistSelect() {
  const sel = document.getElementById('ab-artist');
  sel.innerHTML = '<option value="">Select artist…</option>' +
    artists.map(a => `<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');
}

/* ─── ARTIST FORM ─── */
function showArtistForm(id) {
  editingArtistId = id;
  const a = id ? artists.find(x => x.id === id) : null;
  document.getElementById('artist-form-title').textContent = a ? `Edit: ${a.name}` : 'New Artist';
  document.getElementById('af-id').value = a?.id || '';
  document.getElementById('af-name').value = a?.name || '';
  document.getElementById('af-slug').value = a?.slug || '';
  document.getElementById('af-bio').value = a?.bio || '';
  document.getElementById('af-image').value = a?.image_url || '';
  document.getElementById('af-artwork').value = a?.artwork_url || '';
  document.getElementById('af-genre').value = a?.genre || '';
  document.getElementById('af-website').value = a?.website || '';
  document.getElementById('af-twitter').value = a?.twitter_handle || '';
  document.getElementById('af-instagram').value = a?.instagram_handle || '';
}

function clearArtistForm() { showArtistForm(null); }

async function saveArtist() {
  const id = val('af-id');
  const name = val('af-name');
  const slug = val('af-slug') || id;
  if (!id || !name) { toast('ID and Name are required','error'); return; }
  try {
    if (editingArtistId) {
      await d1Query('UPDATE artists SET name=?,slug=?,bio=?,image_url=?,artwork_url=?,genre=?,website=?,twitter_handle=?,instagram_handle=?,updated_at=datetime(\'now\') WHERE id=?',
        [name,slug,val('af-bio'),val('af-image'),val('af-artwork'),val('af-genre'),val('af-website'),val('af-twitter'),val('af-instagram'),id]);
      toast('Artist updated','success');
    } else {
      await d1Query('INSERT INTO artists (id,name,slug,bio,image_url,artwork_url,genre,website,twitter_handle,instagram_handle,created_at,updated_at) VALUES (?,?,?,?,?,?,?,?,?,?,datetime(\'now\'),datetime(\'now\'))',
        [id,name,slug,val('af-bio'),val('af-image'),val('af-artwork'),val('af-genre'),val('af-website'),val('af-twitter'),val('af-instagram')]);
      toast('Artist created','success');
    }
    await loadArtists();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ─── ALBUM RENDER ─── */
function renderAlbumList() {
  filterAlbums();
}

function filterAlbums() {
  const q = val('album-search').toLowerCase();
  const artistFilter = val('album-artist-filter');
  const filtered = albums.filter(a =>
    (a.title||'').toLowerCase().includes(q) &&
    (!artistFilter || a.artist_id === artistFilter)
  );
  const list = document.getElementById('album-list');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">No albums found.</div>'; return; }
  list.innerHTML = filtered.map(a => {
    const artist = artists.find(x => x.id === a.artist_id);
    return `<div class="entity-card${a.id === editingAlbumId ? ' active' : ''}" onclick="showAlbumForm('${esc(a.id)}')">
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-meta"><span class="card-slug">${esc(artist?.name||'—')}</span><span class="card-tag">${a.track_count||0} tracks</span></div>
    </div>`;
  }).join('');
}

function populateAlbumFilters() {
  const sel = document.getElementById('album-artist-filter');
  sel.innerHTML = '<option value="">All artists</option>' +
    artists.map(a => `<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');
}

function populateAlbumSelect() {
  const sel = document.getElementById('tr-album');
  sel.innerHTML = '<option value="">Select album…</option>' +
    albums.map(a => `<option value="${esc(a.id)}">${esc(a.title)}</option>`).join('');
}

function showAlbumForm(id) {
  editingAlbumId = id;
  const a = id ? albums.find(x => x.id === id) : null;
  document.getElementById('album-form-title').textContent = a ? `Edit: ${a.title}` : 'New Album';
  document.getElementById('ab-artist').value = a?.artist_id || '';
  document.getElementById('ab-title').value = a?.title || '';
  document.getElementById('ab-slug').value = a?.slug || '';
  document.getElementById('ab-desc').value = a?.description || '';
  document.getElementById('ab-artwork').value = a?.artwork_url || '';
  document.getElementById('ab-date').value = a?.release_date || '';
  document.getElementById('ab-tracks').value = a?.track_count || 0;
  document.getElementById('ab-duration').value = a?.total_duration_ms || 0;
  document.getElementById('ab-genre').value = a?.genre || '';
  document.getElementById('ab-verse').value = a?.is_verse_based || 0;
  document.getElementById('ab-upc').value = a?.upc || '';
  document.getElementById('ab-timing-url').value = a?.timing_base_url || '';
  document.getElementById('ab-audio-url').value = a?.audio_base_url || '';
  // Re-populate artist select and keep selection
  populateArtistSelect();
  if (a) document.getElementById('ab-artist').value = a.artist_id;
}

function clearAlbumForm() { showAlbumForm(null); }

async function saveAlbum() {
  const artistId = val('ab-artist');
  const title = val('ab-title');
  const slug = val('ab-slug') || title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  if (!artistId || !title) { toast('Artist and Title are required','error'); return; }
  // Auto-generate album ID if new
  let albumId = editingAlbumId || (Date.now().toString(36) + Math.random().toString(36).slice(2,6));
  try {
    const params = [artistId, title, slug, val('ab-desc'), val('ab-artwork'), val('ab-date'),
      val('ab-genre'), parseInt(val('ab-tracks'))||0, parseInt(val('ab-verse'))||0,
      parseInt(val('ab-duration'))||0, val('ab-upc'), val('ab-timing-url'), val('ab-audio-url')];
    if (editingAlbumId) {
      params.push(albumId);
      await d1Query('UPDATE albums SET artist_id=?,title=?,slug=?,description=?,artwork_url=?,release_date=?,genre=?,track_count=?,is_verse_based=?,total_duration_ms=?,upc=?,timing_base_url=?,audio_base_url=?,updated_at=datetime(\'now\') WHERE id=?', params);
      toast('Album updated','success');
    } else {
      params.unshift(albumId);
      await d1Query('INSERT INTO albums (id,artist_id,title,slug,description,artwork_url,release_date,genre,track_count,is_verse_based,total_duration_ms,upc,timing_base_url,audio_base_url,created_at,updated_at) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,datetime(\'now\'),datetime(\'now\'))', params);
      toast('Album created','success');
    }
    await loadAlbums();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ─── TRACK RENDER ─── */
function renderTrackList() {
  filterTracks();
}

function filterTracks() {
  const q = val('track-search').toLowerCase();
  const albumFilter = val('track-album-filter');
  const filtered = tracks.filter(t =>
    (t.title||'').toLowerCase().includes(q) &&
    (!albumFilter || t.album_id === albumFilter)
  );
  const list = document.getElementById('track-list');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">No tracks found.</div>'; return; }
  list.innerHTML = filtered.map(t => `
    <div class="entity-card${t.id === editingTrackId ? ' active' : ''}" onclick="showTrackForm('${esc(t.id)}')">
      <div class="card-title">#${t.track_number} — ${esc(t.title)}</div>
      <div class="card-meta"><span class="card-slug">${esc(t.album_title||'—')}</span><span class="card-tag">${Math.round((t.duration_ms||0)/1000)}s</span></div>
    </div>
  `).join('');
}

function populateTrackFilters() {
  const sel = document.getElementById('track-album-filter');
  sel.innerHTML = '<option value="">All albums</option>' +
    albums.map(a => `<option value="${esc(a.id)}">${esc(a.title)}</option>`).join('');
}

function showTrackForm(id) {
  editingTrackId = id;
  const t = id ? tracks.find(x => x.id === id) : null;
  document.getElementById('track-form-title').textContent = t ? `Edit: ${t.title}` : 'New Track';
  document.getElementById('tr-album').value = t?.album_id || '';
  document.getElementById('tr-title').value = t?.title || '';
  document.getElementById('tr-number').value = t?.track_number || 1;
  document.getElementById('tr-disc').value = t?.disc_number || 1;
  document.getElementById('tr-duration').value = t?.duration_ms || 8000;
  document.getElementById('tr-audio').value = t?.audio_url || '';
  document.getElementById('tr-preview').value = t?.preview_url || '';
  document.getElementById('tr-timing').value = t?.timing_json_url || '';
  document.getElementById('tr-isrc').value = t?.isrc || '';
  populateAlbumSelect();
  if (t) document.getElementById('tr-album').value = t.album_id;
}

function clearTrackForm() { showTrackForm(null); }

async function saveTrack() {
  const albumId = val('tr-album');
  const title = val('tr-title');
  const trackNum = parseInt(val('tr-number')) || 1;
  if (!albumId || !title) { toast('Album and Title are required','error'); return; }
  const album = albums.find(a => a.id === albumId);
  const trackId = editingTrackId || (album?.artist_id ? album.artist_id + '-' + albumId + '-' + trackNum : Date.now().toString(36));
  try {
    const artistId = album?.artist_id || '';
    const params = [albumId, artistId, title, trackNum, parseInt(val('tr-disc'))||1,
      parseInt(val('tr-duration'))||8000, val('tr-audio'), val('tr-preview'),
      val('tr-timing'), val('tr-isrc')];
    if (editingTrackId) {
      params.push(trackId);
      await d1Query('UPDATE tracks SET album_id=?,artist_id=?,title=?,track_number=?,disc_number=?,duration_ms=?,audio_url=?,preview_url=?,timing_json_url=?,isrc=?,updated_at=datetime(\'now\') WHERE id=?', params);
      toast('Track updated','success');
    } else {
      params.unshift(trackId);
      await d1Query('INSERT INTO tracks (id,album_id,artist_id,title,track_number,disc_number,duration_ms,audio_url,preview_url,timing_json_url,isrc,created_at,updated_at) VALUES (?,?,?,?,?,?,?,?,?,?,?,datetime(\'now\'),datetime(\'now\'))', params);
      toast('Track created','success');
    }
    await loadTracks();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ─── SEED ALAFASY ─── */
async function seedAlafasyData() {
  if (!confirm('This will seed the entire The Holy Quran by Mishary Rashid Alafasy dataset (114 albums, ~6200 tracks). Continue?')) return;
  const btn = document.getElementById('btn-seed');
  btn.disabled = true; btn.textContent = '⏳ Seeding…';
  try {
    // Artist
    await d1Query(`INSERT OR REPLACE INTO artists (id,name,slug,bio,artwork_url,genre,created_at,updated_at) VALUES ('alafasy','Mishari Rashid Alafasy','mishary-rashid-alafasy','Kuwaiti qari and imam.','https://opentuwa.com/assets/ui/web_1200.png','Quran, Recitation',datetime('now'),datetime('now'))`);
    toast('Artist created, importing albums…','info');
    
    const SURAH_NAMES = [
      'The Opening','The Cow','The Family of Imran','The Women','The Table Spread','The Cattle','The Heights','The Spoils of War','The Repentance','Jonah','Hud','Joseph','The Thunder','Abraham','The Rocky Tract','The Bee','The Night Journey','The Cave','Mary','Ta-Ha','The Prophets','The Pilgrimage','The Believers','The Light','The Criterion','The Poets','The Ant','The Narratives','The Spider','The Romans','Luqman','The Prostration','The Combined Forces','Sheba','The Originator','O Man','Those Who Set The Ranks','The Letter Sad','The Troops','The Forgiver','Explained in Detail','The Consultation','The Ornaments of Gold','The Smoke','The Crouching','The Wind-Curved Sandhills','Muhammad','The Victory','The Rooms','The Letter Qaf','The Winnowing Winds','The Mount','The Star','The Moon','The Beneficent','The Inevitable','The Iron','The Pleading Woman','The Exile','She That Is To Be Examined','The Ranks','The Congregation','The Hypocrites','The Mutual Disillusion','The Divorce','The Prohibition','The Sovereignty','The Pen','The Reality','The Ascending Stairways','Noah','The Jinn','The Enshrouded One','The Cloaked One','The Resurrection','Man','The Emissaries','The Tidings','Those Who Drag Forth','He Frowned','The Overthrowing','The Cleaving','The Defrauding','The Sundering','The Mansions of the Stars','The Morning Star','The Most High','The Overwhelming','The Dawn','The City','The Sun','The Night','The Morning Hours','The Relief','The Fig','The Clot','The Power','The Clear Proof','The Earthquake','The Courser','The Calamity','The Rivalry in World Increase','The Declining Day','The Traducer','The Elephant','Quraysh','The Small Kindnesses','The Abundance','The Disbelievers','The Divine Support','The Palm Fiber','The Sincerity','The Daybreak','Mankind'
    ];
    const VERSE_COUNTS = [7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];
    const AUDIO_BASE = 'https://hosting.opentuwa.com';
    const TIMING_BASE = 'https://raw.githubusercontent.com/muslim1446/CDN-muslim.opentuwa.com/main';

    for (let i = 0; i < SURAH_NAMES.length; i++) {
      const ch = i + 1;
      const name = SURAH_NAMES[i];
      const vc = VERSE_COUNTS[i];
      const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
      const albumId = String(ch).padStart(3,'0') + '00000000';
      const desc = `${name} (${vc} verses)`;

      await d1Query('INSERT OR REPLACE INTO albums (id,artist_id,title,slug,description,artwork_url,genre,track_count,is_verse_based,has_timing,timing_base_url,audio_base_url,created_at,updated_at) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,datetime(\'now\'),datetime(\'now\'))',

      for (let v = 1; v <= vc; v++) {
        const trackId = String(ch).padStart(3,'0') + String(v).padStart(3,'0') + '00000';
        const paddedCh = String(ch).padStart(3,'0');
        await d1Query('INSERT OR REPLACE INTO tracks (id,album_id,artist_id,title,track_number,disc_number,duration_ms,audio_url,timing_json_url,has_timing,created_at,updated_at) VALUES (?,?,?,?,?,?,?,?,?,?,datetime(\'now\'),datetime(\'now\'))',

      }
      if (i % 10 === 0) toast(`Album ${ch}/114: ${name}`,'info');
    }
    toast('✅ Seed complete! 1 artist, 114 albums, all tracks','success',5000);
    await loadData();
  } catch(e) {
    toast('Seed error: ' + e.message, 'error', 8000);
  }
  btn.disabled = false; btn.textContent = '🌱 Seed Alafasy';
}

window.onload = () => {
  const savedToken = localStorage.getItem('cms_token');

  loadArtists();
};
